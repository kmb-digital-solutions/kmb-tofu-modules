name: module-validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  format-and-validate:
    name: format + validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.9.0

      - name: Install tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Run scripts/validate_all.sh
        run: |
          chmod +x scripts/validate_all.sh
          ./scripts/validate_all.sh

      - name: Lint each module with tflint
        run: |
          for dir in modules/*/; do
            [[ -d "${dir}" ]] || continue
            echo "── tflint ${dir}"
            (cd "${dir}" && tflint --init >/dev/null 2>&1 && tflint --no-color)
          done

      - name: Refuse sensitive literals
        run: |
          chmod +x scripts/lint_no_literals.sh
          ./scripts/lint_no_literals.sh

  # NOTE: the variables.tf ↔ console.schema.json diff job is intentionally
  # absent here. Application roots live in each product's own private
  # repo, so this check runs in those repos' CI (consuming this repo's
  # modules), not here.
